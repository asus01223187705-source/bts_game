<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTC Miner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body style="background:#0a0e1a;color:#fff;text-align:center;padding:20px;font-family:sans-serif;">
    <h1>🪙 Bitcoin Miner</h1>
    <h2 id="coins">50,000</h2>
    <p>⚡ سرعة: <span id="pph">0</span> / ساعة</p>
    <button onclick="tap()" style="padding:15px;background:#f7931a;color:#000;border:none;border-radius:10px;width:100%;margin:10px 0;font-weight:bold;">اضغط +100</button>
    <button onclick="claim()" style="padding:15px;background:#f7931a;color:#000;border:none;border-radius:10px;width:100%;margin:10px 0;font-weight:bold;">مكافأة +50,000</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        let coins = parseInt(localStorage.getItem('coins')) || 50000;
        let pph = parseInt(localStorage.getItem('pph')) || 0;
        let lastOnline = parseInt(localStorage.getItem('lastOnline')) || Date.now();
        
        // التعدين الأوفلاين
        let now = Date.now();
        let hoursDiff = (now - lastOnline) / 3600000;
        if (hoursDiff > 0 && pph > 0) {
            let offlineCoins = Math.floor(pph * hoursDiff);
            coins += offlineCoins;
            if (offlineCoins > 0) tg.showAlert('رجعت! جمعت ' + offlineCoins + ' وانت مش موجود');
        }
        
        function tap() {
            coins += 100;
            update();
            save();
        }
        
        function claim() {
            coins += 50000;
            tg.showAlert('تم إضافة 50,000!');
            update();
            save();
        }
        
        function update() {
            document.getElementById('coins').innerText = coins.toLocaleString();
            document.getElementById('pph').innerText = pph.toLocaleString();
        }
        
        function save() {
            localStorage.setItem('coins', coins);
            localStorage.setItem('pph', pph);
            localStorage.setItem('lastOnline', Date.now());
        }
        
        setInterval(function() {
            coins += Math.floor(pph / 3600);
            update();
            save();
        }, 1000);
        
        update();
    </script>
</body>
</html>
