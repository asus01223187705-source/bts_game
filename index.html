<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTS Miner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:sans-serif; }
        body { background:#0a0e1a; color:#fff; text-align:center; padding:10px; min-height:100vh; }
     .header { background:#1a1f2e; padding:15px; border-radius:15px; margin-bottom:10px; border:1px solid #f7931a30; }
     .balance { font-size:28px; font-weight:bold; color:#f7931a; display:flex; align-items:center; justify-content:center; gap:8px; }
     .profit { font-size:14px; color:#4ade80; margin-top:5px; }
     .coin-img { width:140px; margin:10px 0; filter: drop-shadow(0 0 20px gold); cursor:pointer; transition:0.1s; }
     .coin-img:active { transform:scale(0.92); }
     .main-tabs { display:flex; gap:6px; margin:15px 0; overflow-x:auto; }
     .main-tab { flex:1; padding:12px 5px; background:#1a1f2e; border-radius:12px; cursor:pointer; font-size:13px; border:1px solid #ffffff10; white-space:nowrap; }
     .main-tab.active { background:#f7931a; color:#1a1a1a; font-weight:bold; }
     .sub-tabs { display:flex; gap:8px; margin:15px 0; background:#1a1f2e; padding:5px; border-radius:12px; }
     .sub-tab { flex:1; padding:10px; border-radius:8px; cursor:pointer; font-size:13px; }
     .sub-tab.active { background:#f7931a; color:#1a1a1a; font-weight:bold; }
     .hidden { display:none; }
     .cards-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px; }
     .card-item { background:#1a1f2e; border:1px solid #f7931a20; border-radius:15px; padding:10px; text-align:center; position:relative; }
     .card-icon { width:100%; border-radius:10px; height:90px; background:linear-gradient(135deg, #f7931a, #ffb347); display:flex; align-items:center; justify-content:center; font-size:40px; margin-bottom:8px; }
     .card-level { position:absolute; top:15px; left:50%; transform:translateX(-50%); background:#000000cc; padding:3px 10px; border-radius:10px; font-size:11px; font-weight:bold; }
     .card-title { font-size:13px; font-weight:bold; margin:5px 0; height:32px; }
     .card-profit { font-size:13px; color:#f7931a; display:flex; align-items:center; justify-content:center; gap:4px; margin:8px 0; }
     .upgrade-btn { background:#2d8cff; color:#fff; border:none; border-radius:10px; padding:8px; width:100%; font-size:12px; font-weight:bold; cursor:pointer; }
     .btn { padding:14px; background:#f7931a; color:#1a1a1a; border:none; border-radius:15px; cursor:pointer; font-weight:bold; width:100%; margin:8px 0; }
    </style>
</head>
<body>
    <div class="header">
        <div class="balance">🪙 <span id="coins">50,000</span></div>
        <div class="profit">⚡ سرعة التعدين: <span id="pph">0</span> / ساعة</div>
    </div>

    <div class="main-tabs" id="mainTabs">
        <div class="main-tab active" data-tab="invest">التعدين</div>
        <div class="main-tab" data-tab="combo">الكومبو</div>
        <div class="main-tab" data-tab="friends">الأصدقاء</div>
        <div class="main-tab" data-tab="tasks">المهام</div>
        <div class="main-tab" data-tab="wallet">المحفظة</div>
    </div>

    <div id="invest" class="tab-content">
        <img src="https://pngimg.com/d/bitcoin_PNG48.png" class="coin-img" id="coinBtn">
        <div class="sub-tabs" id="subTabs">
            <div class="sub-tab active" data-cat="rides">Rides</div>
            <div class="sub-tab" data-cat="digs">Digs</div>
            <div class="sub-tab" data-cat="shops">Shops</div>
        </div>
        <div id="rides" class="cards-grid"></div>
        <div id="digs" class="cards-grid hidden"></div>
        <div id="shops" class="cards-grid hidden"></div>
        <button class="btn" id="claimBtn" style="margin-top:15px;">مكافأة يومية +50,000</button>
        <p id="timer" style="margin-top:8px; font-size:13px; opacity:0.7;"></p>
    </div>

    <div id="combo" class="tab-content hidden">
        <div style="background:#1a1f2e; border:2px solid #f7931a; border-radius:15px; padding:15px; margin:15px 0;">
            <h3>🎯 الكومبو اليومي</h3>
            <p style="font-size:13px; opacity:0.8; margin-top:10px;">قريباً...</p>
        </div>
    </div>

    <div id="friends" class="tab-content hidden">
        <div style="background:#1a1f2e; padding:15px; border-radius:15px; margin:10px 0; border:1px solid #f7931a20;">
            <h3>👥 ادعو أصدقائك</h3>
            <p style="font-size:13px; opacity:0.8;">انت تاخد 100,000 + صديقك ياخد 50,000</p>
            <div id="refLink" style="font-size:11px; background:#0a0e1a; padding:10px; border-radius:10px; word-break:break-all; margin:10px 0; border:1px dashed #f7931a50;"></div>
            <button class="btn" id="copyBtn">نسخ رابط الدعوة</button>
        </div>
    </div>

    <div id="tasks" class="tab-content hidden">
        <h3 style="margin:15px 0;">المهام اليومية 📋</h3>
        <div style="background:#1a1f2e; padding:15px; border-radius:15px; margin:10px 0; border:1px solid #f7931a20;">
            <h4>شاهد إعلان</h4>
            <p style="font-size:13px; opacity:0.8; margin:5px 0;">+50,000 عملة</p>
            <button class="btn" id="adBtn">شاهد الآن</button>
        </div>
    </div>

    <div id="wallet" class="tab-content hidden">
        <h3 style="margin:15px 0;">محفظتك 💼</h3>
        <div style="background:#1a1f2e; padding:20px; border-radius:15px; border:1px solid #f7931a20;">
            <div style="font-size:28px; margin:10px 0; color:#f7931a;"><span id="walletCoins">0</span></div>
            <button class="btn" id="walletBtn">ربط محفظة TON</button>
            <div id="walletAddr" style="font-size:11px; margin-top:10px; opacity:0.7;">لم يتم الربط</div>
            <p style="font-size:14px; opacity:0.8; margin-top:20px; color:#4ade80;">🎁 التوزيع قريباً</p>
        </div>
    </div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    let tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    let coins = parseInt(localStorage.getItem('coins')) || 50000;
    let pph = parseInt(localStorage.getItem('pph')) || 0;
    let lastClaim = parseInt(localStorage.getItem('lastClaim')) || 0;
    let wallet = localStorage.getItem('wallet') || '';
    let cards = JSON.parse(localStorage.getItem('cards')) || {};

    const ridesCards = [
        {id:'nova', name:'Nova Nosecone', icon:'🚀', baseProfit:26200000, baseCost:293570000},
        {id:'rusty', name:'Rusty Rover', icon:'🚗', baseProfit:732, baseCost:2530},
        {id:'void', name:'Void Voyager', icon:'🛸', baseProfit:23100000, baseCost:259480000},
        {id:'classic', name:'Classic Ride', icon:'🏎️', baseProfit:5000000, baseCost:50000000},
    ];

    const digsCards = [
        {id:'gpu', name:'GPU Miner', icon:'💻', baseProfit:500000, baseCost:5000000},
        {id:'asic', name:'ASIC Pro', icon:'⚙️', baseProfit:2500000, baseCost:25000000},
        {id:'farm', name:'Mining Farm', icon:'🏭', baseProfit:12000000, baseCost:120000000},
        {id:'pool', name:'Mining Pool', icon:'🌊', baseProfit:60000000, baseCost:600000000},
    ];

    const shopsCards = [
        {id:'exchange', name:'Exchange', icon:'💱', baseProfit:100000000, baseCost:1000000000},
        {id:'nft', name:'NFT Market', icon:'🖼️', baseProfit:50000000, baseCost:500000000},
        {id:'defi', name:'DeFi Bank', icon:'🏦', baseProfit:250000000, baseCost:2500000000},
        {id:'meme', name:'Meme Coins', icon:'🐶', baseProfit:15000000, baseCost:150000000},
    ];

    function formatNum(num) {
        if(num >= 1e12) return (num/1e12).toFixed(2)+'T';
        if(num >= 1e9) return (num/1e9).toFixed(2)+'B';
        if(num >= 1e6) return (num/1e6).toFixed(2)+'M';
        if(num >= 1e3) return (num/1e3).toFixed(2)+'K';
        return Math.floor(num).toLocaleString();
    }

    function renderCards(categoryId, cardsArray) {
        let html = '';
        cardsArray.forEach(card => {
            let level = cards[card.id] || 1;
            let cost = Math.floor(card.baseCost * Math.pow(1.8, level-1));
            let profit = Math.floor(card.baseProfit * level);
            html += `
            <div class="card-item">
                <div class="card-level">Level ${level}</div>
                <div class="card-icon">${card.icon}</div>
                <div class="card-title">${card.name}</div>
                <div class="card-profit">⚡ +${formatNum(profit)} سرعة</div>
                <button class="upgrade-btn" data-card="${card.id}" data-cost="${cost}" data-profit="${card.baseProfit}">ترقية<br>🪙 ${formatNum(cost)}</button>
            </div>`;
        });
        document.getElementById(categoryId).innerHTML = html;
    }

    function updateUI() {
        document.getElementById('coins').innerText = formatNum(coins);
        document.getElementById('walletCoins').innerText = formatNum(coins);
        document.getElementById('pph').innerText = formatNum(pph);
        if(wallet) document.getElementById('walletAddr').innerText = wallet;
    }

    function save() {
        localStorage.setItem('coins', coins);
        localStorage.setItem('pph', pph);
        localStorage.setItem('lastClaim', lastClaim);
        localStorage.setItem('wallet', wallet);
        localStorage.setItem('cards', JSON.stringify(cards));
    }

    setInterval(() => {
        coins += Math.floor(pph / 3600);
        updateUI();
        save();
    }, 1000);

    document.getElementById('coinBtn').addEventListener('click', function() {
        coins += 100;
        tg.HapticFeedback.impactOccurred('light');
        updateUI();
        save();
    });

    document.body.addEventListener('click', function(e) {
        if(e.target.classList.contains('upgrade-btn')) {
            let cardId = e.target.dataset.card;
            let cost = parseInt(e.target.dataset.cost);
            let profit = parseInt(e.target.dataset.profit);
            if(coins >= cost) {
                coins -= cost;
                cards[cardId] = (cards[cardId] || 1) + 1;
                pph += profit;
                tg.HapticFeedback.notificationOccurred('success');
                renderCards('rides', ridesCards);
                renderCards('digs', digsCards);
                renderCards('shops', shopsCards);
                updateUI();
                save();
            } else {
                tg.showAlert('رصيدك مش كافي!');
            }
        }
    });

    document.getElementById('claimBtn').addEventListener('click', function() {
        let now = Date.now();
        if(now - lastClaim >= 86400000) {
            coins += 50000;
            lastClaim = now;
            tg.showAlert('تم جمع 50,000!');
            updateUI();
            save();
            checkTimer();
        }
    });

    function checkTimer() {
        let now = Date.now();
        let diff = 86400000 - (now - lastClaim);
        if(diff > 0) {
            let h = Math.floor(diff / 3600000);
            let m = Math.floor((diff % 3600000) / 60000);
            document.getElementById('timer').innerText = `متاح بعد: ${h}س ${m}د`;
            document.getElementById('claimBtn').disabled = true;
        } else {
            document.getElementById('timer').innerText = 'المكافأة جاهزة!';
            document.getElementById('claimBtn').disabled = false;
        }
    }
    setInterval(checkTimer, 60000);

    document.getElementById('adBtn').addEventListener('click', function() {
        coins += 50000;
        tg.showAlert('+50,000 عملة!');
        updateUI();
        save();
    });

    document.getElementById('walletBtn').addEventListener('click', function() {
        tg.showPrompt('حط عنوان محفظة TON', (addr) => {
            if(addr) {
                wallet = addr;
                tg.showAlert('تم ربط المحفظة!');
                updateUI();
                save();
            }
        });
    });

    document.getElementById('copyBtn').addEventListener('click', function() {
        let userId = tg.initDataUnsafe.user?.id || '123456';
        let link = `https://t.me/BTS_sr_bot?start=${userId}`;
        navigator.clipboard.writeText(link);
        tg.showAlert('تم نسخ رابط الدعوة!');
    });

    document.getElementById('mainTabs').addEventListener('click', function(e) {
        if(e.target.classList.contains('main-tab')) {
            document.querySelectorAll('.tab-content').forEach(d => d.classList.add('hidden'));
            document.getElementById(e.target.dataset.tab).classList.remove('hidden');
            document.querySelectorAll('.main-tab').forEach(t => t.classList.remove('active'));
            e.target.classList.add('active');
        }
    });

    document.getElementById('subTabs').addEventListener('click', function(e) {
        if(e.target.classList.contains('sub-tab')) {
            document.querySelectorAll('#rides, #digs, #shops').forEach(d => d.classList.add('hidden'));
            document.getElementById(e.target.dataset.cat).classList.remove('hidden');
            document.querySelectorAll('.sub-tab').forEach(t => t.classList.remove('active'));
            e.target.classList.add('active');
        }
    });

    let userId = tg.initDataUnsafe.user?.id || '123456';
    document.getElementById('refLink').innerText = `https://t.me/BTS_sr_bot?start=${userId}`;

    renderCards('rides', ridesCards);
    renderCards('digs', digsCards);
    renderCards('shops', shopsCards);
    updateUI();
    checkTimer();
});
</script>
</body>
</html>
