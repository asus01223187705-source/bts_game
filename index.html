<script>
document.addEventListener('DOMContentLoaded', function() {
    let tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: 'https://asus0122318.github.io/BTS_sr/tonconnect-manifest.json',
        buttonRootId: 'ton-connect'
    });

    tonConnectUI.onStatusChange(wallet => {
        if (wallet) {
            let addr = wallet.account.address;
            document.getElementById('walletAddr').innerText = addr.slice(0,6) + '...' + addr.slice(-4);
            localStorage.setItem('wallet', addr);
            tg.showAlert('تم ربط المحفظة بنجاح!');
        } else {
            document.getElementById('walletAddr').innerText = 'لم يتم الربط';
            localStorage.removeItem('wallet');
        }
    });

    let coins = parseInt(localStorage.getItem('coins')) || 50000;
    let pph = parseInt(localStorage.getItem('pph')) || 0;
    let lastBoost = parseInt(localStorage.getItem('lastBoost')) || 0;
    let boostActive = parseInt(localStorage.getItem('boostActive')) || 0;
    let wallet = localStorage.getItem('wallet') || '';
    let cards = JSON.parse(localStorage.getItem('cards')) || {};
    let friends = JSON.parse(localStorage.getItem('friends')) || [];
    let selectedCombo = [];
    let lastComboDate = localStorage.getItem('lastComboDate') || '';
    let todayCombo = [];

    const ridesCards = [
        {id:'nova', name:'Nova Nosecone', icon:'🚀', baseProfit:26200000, baseCost:293570000},
        {id:'rusty', name:'Rusty Rover', icon:'🚗', baseProfit:732, baseCost:2530},
        {id:'void', name:'Void Voyager', icon:'🛸', baseProfit:23100000, baseCost:259480000},
        {id:'classic', name:'Classic Ride', icon:'🏎️', baseProfit:5000000, baseCost:50000000},
    ];

    const digsCards = [
        {id:'gpu', name:'GPU Miner', icon:'💻', baseProfit:500000, baseCost:5000000},
        {id:'asic', name:'ASIC Pro', icon:'⚙️', baseProfit:2500000, baseCost:25000000},
        {id:'farm', name:'Mining Farm', icon:'🏭', baseProfit:12000000, baseCost:120000000},
        {id:'pool', name:'Mining Pool', icon:'🌊', baseProfit:60000000, baseCost:600000000},
    ];

    const shopsCards = [
        {id:'exchange', name:'Exchange', icon:'💱', baseProfit:100000000, baseCost:1000000000},
        {id:'nft', name:'NFT Market', icon:'🖼️', baseProfit:50000000, baseCost:500000000},
        {id:'defi', name:'DeFi Bank', icon:'🏦', baseProfit:250000000, baseCost:2500000000},
        {id:'meme', name:'Meme Coins', icon:'🐶', baseProfit:15000000, baseCost:150000000},
    ];

    const allCardsList = [...ridesCards,...digsCards,...shopsCards];

    function formatNum(num) {
        if(num >= 1e12) return (num/1e12).toFixed(2)+'T';
        if(num >= 1e9) return (num/1e9).toFixed(2)+'B';
        if(num >= 1e6) return (num/1e6).toFixed(2)+'M';
        if(num >= 1e3) return (num/1e3).toFixed(2)+'K';
        return Math.floor(num).toLocaleString();
    }

    function getCurrentPPH() {
        let now = Date.now();
        if(now - boostActive < 10800000) { // 3 ساعات
            return pph * 2;
        }
        return pph;
    }

    function renderCards(categoryId, cardsArray) {
        let html = '';
        cardsArray.forEach(card => {
            let level = cards[card.id] || 1;
            let cost = Math.floor(card.baseCost * Math.pow(1.8, level-1));
            let profit = Math.floor(card.baseProfit * level);
            let isSelected = selectedCombo.includes(card.id);
            html += `
            <div class="card-item ${isSelected? 'selected' : ''}" data-card="${card.id}">
                <div class="card-level">Level ${level}</div>
                <div class="card-icon">${card.icon}</div>
                <div class="card-title">${card.name}</div>
                <div class="card-profit">⚡ +${formatNum(profit)} سرعة</div>
                <button class="upgrade-btn" data-card="${card.id}" data-cost="${cost}" data-profit="${card.baseProfit}">ترقية<br>🪙 ${formatNum(cost)}</button>
            </div>`;
        });
        document.getElementById(categoryId).innerHTML = html;
    }

    function updateUI() {
        document.getElementById('coins').innerText = formatNum(coins);
        document.getElementById('walletCoins').innerText = formatNum(coins);
        let currentPPH = getCurrentPPH();
        document.getElementById('pph').innerHTML = formatNum(currentPPH) + (boostActive > Date.now() - 10800000? ' <span style="color:#fbbf24;">x2</span>' : '');
        if(wallet) document.getElementById('walletAddr').innerText = wallet.slice(0,6) + '...' + wallet.slice(-4);
        updateComboSlots();
        updateFriendsList();
        updateBoostTimer();
    }

    function save() {
        localStorage.setItem('coins', coins);
        localStorage.setItem('pph', pph);
        localStorage.setItem('lastBoost', lastBoost);
        localStorage.setItem('boostActive', boostActive);
        localStorage.setItem('wallet', wallet);
        localStorage.setItem('cards', JSON.stringify(cards));
        localStorage.setItem('friends', JSON.stringify(friends));
    }

    setInterval(() => {
        coins += Math.floor(getCurrentPPH() / 3600);
        updateUI();
        save();
    }, 1000);

    document.getElementById('coinBtn').addEventListener('click', function() {
        coins += 100;
        tg.HapticFeedback.impactOccurred('light');
        updateUI();
        save();
    });

    document.body.addEventListener('click', function(e) {
        if(e.target.classList.contains('upgrade-btn')) {
            let cardId = e.target.dataset.card;
            let cost = parseInt(e.target.dataset.cost);
            let profit = parseInt(e.target.dataset.profit);
            if(coins >= cost) {
                coins -= cost;
                cards[cardId] = (cards[cardId] || 1) + 1;
                pph += profit;
                tg.HapticFeedback.notificationOccurred('success');
                renderCards('rides', ridesCards);
                renderCards('digs', digsCards);
                renderCards('shops', shopsCards);
                updateUI();
                save();
            } else {
                tg.showAlert('رصيدك مش كافي!');
            }
        }
        if(e.target.closest('.card-item') &&!e.target.classList.contains('upgrade-btn')) {
            let cardId = e.target.closest('.card-item').dataset.card;
            selectCardForCombo(cardId);
        }
    });

    function selectCardForCombo(cardId) {
        if(selectedCombo.includes(cardId)) {
            selectedCombo = selectedCombo.filter(id => id!== cardId);
        } else if(selectedCombo.length < 3) {
            selectedCombo.push(cardId);
        }
        renderCards('rides', ridesCards);
        renderCards('digs', digsCards);
        renderCards('shops', shopsCards);
        updateComboSlots();
    }

    function updateComboSlots() {
        let slots = document.querySelectorAll('.combo-slot');
        slots.forEach((slot, i) => {
            if(selectedCombo[i]) {
                let card = allCardsList.find(c => c.id === selectedCombo[i]);
                slot.innerHTML = card.icon;
                slot.classList.add('filled');
            } else {
                slot.innerHTML = '?';
                slot.classList.remove('filled');
            }
        });
        document.getElementById('checkComboBtn').disabled = selectedCombo.length!== 3;
    }

    document.getElementById('checkComboBtn').addEventListener('click', function() {
        if(selectedCombo.length!== 3) return;
        let sorted = [...selectedCombo].sort();
        let correctSorted = [...todayCombo].sort();
        if(JSON.stringify(sorted) === JSON.stringify(correctSorted)) {
            coins += 5000000;
            tg.HapticFeedback.notificationOccurred('success');
            tg.showAlert('🎉 كومبو صح! +5,000,000 عملة!');
            localStorage.setItem('comboClaimed', new Date().toDateString());
        } else {
            tg.showAlert('❌ كومبو غلط! جرب بكرة');
        }
        selectedCombo = [];
        renderCards('rides', ridesCards);
        renderCards('digs', digsCards);
        renderCards('shops', shopsCards);
        updateComboSlots();
        updateUI();
        save();
    });

    function generateTodayCombo() {
        let today = new Date().toDateString();
        if(lastComboDate!== today) {
            let shuffled = [...allCardsList].sort(() => 0.5 - Math.random());
            todayCombo = shuffled.slice(0, 3).map(c => c.id);
            localStorage.setItem('todayCombo', JSON.stringify(todayCombo));
            localStorage.setItem('lastComboDate', today);
            lastComboDate = today;
        } else {
            todayCombo = JSON.parse(localStorage.getItem('todayCombo') || '[]');
        }
        updateComboTimer();
    }

    function updateComboTimer() {
        let today = new Date().toDateString();
        let claimed = localStorage.getItem('comboClaimed');
        if(claimed === today) {
            document.getElementById('comboTimer').innerText = 'استلمت المكافأة خلاص! ارجع بكرة';
            document.getElementById('checkComboBtn').disabled = true;
        } else {
            document.getElementById('comboTimer').innerText = 'اختار 3 كروت واضغط تحقق';
        }
    }

    // زرار البوست الجديد كل 3 ساعات
    document.getElementById('claimBtn').innerText = '⚡ تشغيل التعدين السريع x2';
    document.getElementById('claimBtn').addEventListener('click', function() {
        let now = Date.now();
        if(now - lastBoost >= 10800000) { // 3 ساعات
            tg.showConfirm('هتشوف إعلان 30 ثانية وتاخد x2 تعدين لمدة 3 ساعات + 50K فوري؟', (ok) => {
                if(ok) {
                    coins += 50000;
                    lastBoost = now;
                    boostActive = now;
                    tg.showAlert('🔥 تم تفعيل التعدين السريع x2 لمدة 3 ساعات!');
                    updateUI();
                    save();
                }
            });
        } else {
            tg.showAlert('البوست شغال! استنى المدة تخلص');
        }
    });

    function updateBoostTimer() {
        let now = Date.now();
        let diff = 10800000 - (now - lastBoost);
        if(diff > 0) {
            let h = Math.floor(diff / 3600000);
            let m = Math.floor((diff % 3600000) / 60000);
            document.getElementById('timer').innerText = `بوست التعدين متاح بعد: ${h}س ${m}د`;
            document.getElementById('claimBtn').disabled = true;
        } else {
            document.getElementById('timer').innerText = 'التعدين السريع x2 جاهز!';
            document.getElementById('claimBtn').disabled = false;
        }
    }
    setInterval(updateBoostTimer, 60000);

    document.getElementById('adBtn').addEventListener('click', function() {
        tg.showConfirm('هتفرج على إعلان 30 ثانية؟', (ok) => {
            if(ok) {
                coins += 50000;
                tg.showAlert('+50,000 عملة!');
                updateUI();
                save();
            }
        });
    });

    function handleReferral() {
        let startParam = tg.initDataUnsafe.start_param;
        if(startParam && startParam!== tg.initDataUnsafe.user?.id.toString()) {
            let refId = startParam;
            if(!friends.includes(refId)) {
                friends.push(refId);
                coins += 100000;
                tg.showAlert('🎉 صديق انضم! +100,000 عملة');
                save();
            }
        }
    }

    function generateRefLink() {
        let userId = tg.initDataUnsafe.user?.id || '123456';
        let link = `https://t.me/BTS_sr_bot?start=${userId}`;
        document.getElementById('refLink').innerText = link;
        return link;
    }

    document.getElementById('copyBtn').addEventListener('click', function() {
        navigator.clipboard.writeText(generateRefLink());
        tg.showAlert('تم نسخ رابط الدعوة!');
    });

    document.getElementById('shareBtn').addEventListener('click', function() {
        let link = generateRefLink();
        tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=🔥 انضم لـ BTS Miner وخد 50,000 عملة هدية!`);
    });

    function updateFriendsList() {
        document.getElementById('friendCount').innerText = friends.length;
        if(friends.length === 0) {
            document.getElementById('friendsList').innerHTML = '<p style="opacity:0.6; font-size:13px;">مفيش أصدقاء لسه. ادعو حد!</p>';
            return;
        }
        let html = '';
        friends.forEach((friendId, i) => {
            html += `
            <div class="friend-item">
                <div style="display:flex; align-items:center; gap:10px;">
                    <div class="friend-avatar">${friendId.slice(-2)}</div>
                    <div style="text-align:right;">
                        <div style
