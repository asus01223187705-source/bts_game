<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitcoin Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body style="text-align:center; font-family:sans-serif; background:#1a1a1a; color:#f7931a; padding:30px; min-height:100vh;">
    <h1>اجمع Bitcoin 💰</h1>
    <img src="https://pngimg.com/d/bitcoin_PNG48.png" width="180" style="margin:20px 0; filter: drop-shadow(0 0 20px #f7931a);">
    <div id="coins" style="font-size:50px; font-weight:bold; margin:20px 0; color:#f7931a;">0</div>
    <button onclick="addCoins()" style="padding:20px 50px; font-size:24px; background:#f7931a; color:#1a1a1a; border:none; border-radius:50px; cursor:pointer; font-weight:bold; box-shadow: 0 5px 15px #f7931a50;">اجمع +10</button>
    <p style="margin-top:15px; opacity:0.8; color:#fff;">+10 ساتوشي لكل ضغطة</p>
    
    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let coins = 0;
        function addCoins() {
            coins += 10;
            document.getElementById('coins').innerText = coins;
            tg.HapticFeedback.impactOccurred('light');
        }
    </script>
</body>
</html>
