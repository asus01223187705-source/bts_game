<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body style="background:#000;color:#f7931a;text-align:center;padding:50px;font-family:sans-serif;">
    <h1>BTS Miner شغال ✅</h1>
    <h2 id="coins">50,000</h2>
    <button onclick="add()" style="padding:20px;background:#f7931a;color:#000;border:none;border-radius:10px;width:100%;font-size:20px;margin-top:20px;">اضغط +100</button>
    
    <script>
        let tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        let coins = 50000;
        function add() {
            coins += 100;
            document.getElementById('coins').innerText = coins;
            tg.HapticFeedback.impactOccurred('light');
        }
    </script>
</body>
</html>
